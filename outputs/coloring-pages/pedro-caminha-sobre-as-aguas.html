<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pedro Caminha Sobre as Águas — Página para Colorir</title>
<style>
  @page { size: A4; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 210mm; height: 297mm; background: #fff; font-family: Georgia, 'Times New Roman', serif; color: #111; }
  .page { width: 210mm; height: 297mm; padding: 10mm 14mm 10mm; display: flex; flex-direction: column; position: relative; }
  header { text-align: center; border-bottom: 2px solid #111; padding-bottom: 4mm; margin-bottom: 4mm; }
  h1 { font-size: 28px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; font-family: 'Georgia', serif; }
  .verse { font-size: 13px; margin-top: 2mm; font-style: italic; color: #333; }
  .reference { font-size: 10px; margin-top: 1mm; letter-spacing: 3px; text-transform: uppercase; color: #444; }
  .art { flex: 1; display: flex; align-items: center; justify-content: center; margin: 2mm 0; min-height: 0; }
  .art img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
  footer { display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: #444; border-top: 1px solid #111; padding-top: 3mm; margin-top: 2mm; font-family: Georgia, serif; letter-spacing: 1px; }
  .name-box { border-bottom: 1px solid #111; min-width: 55mm; display: inline-block; padding: 0 4px; margin-left: 6px; }
  @media print { .no-print { display: none !important; } }
  .no-print { position: fixed; bottom: 14px; right: 14px; background: #111; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; border: none; cursor: pointer; font-family: inherit; box-shadow: 0 4px 12px rgba(0,0,0,.2); }
  .no-print:hover { background: #333; }
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>Pedro Caminha Sobre as Águas</h1>
    <div class="verse">"Tem coragem! Sou eu. Não tenham medo."</div>
    <div class="reference">Mateus 14 · 22 — 33</div>
  </header>

  <div class="art">
    <img src="pedro-aguas-20260417_123649.png" alt="Pedro caminhando sobre as águas com Jesus" />
  </div>

  <footer>
    <div>Nome:<span class="name-box"></span></div>
    <div>Idade:<span class="name-box" style="min-width:18mm"></span></div>
    <div style="font-weight:700">JARDIM DA FÉ</div>
  </footer>
</div>

<button class="no-print" onclick="window.print()">Imprimir / Salvar PDF</button>
</body>
</html>
