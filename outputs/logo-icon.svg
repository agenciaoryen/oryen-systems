<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!--
    Oryen — Ícone isolado (favicon / app icon)
    Uso: favicon 16x16+, app icon, avatar
    Fundo: #111118 com border-radius aplicado via CSS ou via rect com rx
  -->

  <!-- Fundo arredondado para uso como app icon -->
  <rect width="48" height="48" rx="10.5" fill="#111118"/>

  <!-- Arco principal: traço 6px -->
  <path
    d="M 38.73 15.5 A 17 17 0 1 1 9.27 15.5"
    transform="translate(0, 0)"
    stroke="#2D7EF8"
    stroke-width="6"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Arco secundário: traço 3.5px, opacidade 60% -->
  <path
    d="M 6.68 34 A 20 20 0 0 1 36.86 39.32"
    stroke="#2D7EF8"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-opacity="0.6"
    fill="none"
  />

</svg>
