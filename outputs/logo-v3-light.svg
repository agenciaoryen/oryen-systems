<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 48" fill="none">
  <!--
    Oryen — Logo v3 Light (horizontal, light background)
    Conceito: "Open Core"
    Simbolo: dois arcos formando um O aberto com nucleo central
    Wordmark: "oryen" em Plus Jakarta Sans SemiBold, caixa baixa
    Versao: 3.0 — fundo claro
  -->

  <defs>
    <linearGradient id="brand-grad-light" x1="8" y1="8" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3A5AE6"/>
      <stop offset="50%" stop-color="#5A4AD9"/>
      <stop offset="100%" stop-color="#7C4FD4"/>
    </linearGradient>
  </defs>

  <!-- Arco direito -->
  <path
    d="M 27.9 9.5 A 15 15 0 0 1 27.9 38.5"
    stroke="url(#brand-grad-light)"
    stroke-width="3.5"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Arco esquerdo -->
  <path
    d="M 20.1 9.5 A 15 15 0 0 0 20.1 38.5"
    stroke="url(#brand-grad-light)"
    stroke-width="3.5"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Nucleo central -->
  <circle
    cx="24"
    cy="24"
    r="3"
    fill="url(#brand-grad-light)"
  />

  <!-- Wordmark -->
  <text
    x="50"
    y="31"
    font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif"
    font-size="26"
    font-weight="600"
    letter-spacing="-0.02em"
    fill="#0C0C16"
  >oryen</text>

</svg>
